<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model (Custom UI)</title>
    <style>
        /* สไตล์มินิมอลและโมเดิร์น */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #4a5568;
        }

        .subtitle {
            font-size: 14px;
            color: #718096;
            margin-bottom: 25px;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            margin-bottom: 20px;
            width: 100%;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 15px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            background-color: #edf2f7;
            display: none; /* ซ่อนไว้ก่อนกดเริ่ม */
        }

        #webcam-container canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #label-container {
            margin-top: 25px;
            text-align: left;
        }

        /* ตกแต่งแถบแสดงผลการทำนาย */
        .label-row {
            margin-bottom: 15px;
        }

        .label-text {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .progress-bar-bg {
            background-color: #e2e8f0;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #4299e1, #667eea);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease; /* ทำให้แถบวิ่งแบบนุ่มนวล */
        }

        .status-text {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine</h1>
    <div class="subtitle">ระบบวิเคราะห์รูปภาพผ่านกล้อง (อัปเดตทุก 3 วินาที)</div>
    
    <button type="button" class="btn-start" onclick="init()">เริ่มทำงานกล้อง</button>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>
    <div id="status" class="status-text"></div>
</div>

<!-- โหลดคลังไลบรารีของ TensorFlow และ Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลของคุณจาก Teachable Machine
    const URL = "https://teachablemachine.withgoogle.com/models/KbeR_Yk3v/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    async function init() {
        // เปลี่ยนข้อความสถานะและซ่อนปุ่มหลังกด เพื่อป้องกันการกดซ้ำ
        document.querySelector('.btn-start').innerText = "กำลังโหลดโมเดล...";
        document.querySelector('.btn-start').disabled = true;

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // โหลดโมเดล
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // ตั้งค่ากล้องเว็บแคม
        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip); 
        await webcam.setup(); 
        await webcam.play();
        
        // แสดงตู้คอนเทนเนอร์กล้องและเริ่มวาดเฟรมภาพลง Canvas
        document.getElementById("webcam-container").style.display = "inline-block";
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        window.requestAnimationFrame(loop);

        // สร้างโครงสร้างแถบความมั่นใจ (Progress Bar) มารองรับผลการทำนาย
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // ล้างค่าเก่าออกก่อน
        for (let i = 0; i < maxPredictions; i++) {
            const row = document.createElement("div");
            row.className = "label-row";

            const textDiv = document.createElement("div");
            textDiv.className = "label-text";
            textDiv.innerHTML = `<span class="class-name">รอการประมวลผล...</span><span class="class-prob">0%</span>`;

            const bgDiv = document.createElement("div");
            bgDiv.className = "progress-bar-bg";

            const fillDiv = document.createElement("div");
            fillDiv.className = "progress-bar-fill";

            bgDiv.appendChild(fillDiv);
            row.appendChild(textDiv);
            row.appendChild(bgDiv);
            labelContainer.appendChild(row);
        }

        // ซ่อนปุ่มเริ่มเมื่อทุกอย่างพร้อมใช้งานแล้ว
        document.querySelector('.btn-start').style.display = "none";
        document.getElementById("status").innerText = "ระบบกำลังวิเคราะห์ภาพทุกๆ 3 วินาที...";

        // เรียกทำนายครั้งแรกทันที และตั้งเวลาให้ทำนายซ้ำทุก 3000 มิลลิวินาที (3 วินาที)
        predict();
        predictInterval = setInterval(predict, 3000);
    }

    // ฟังก์ชัน Loop ทำหน้าที่อัปเดตภาพหน้ากล้องให้เคลื่อนไหวลื่นไหลเป็นธรรมชาติ
    async function loop() {
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    // ฟังก์ชันทำนายผลลัพธ์จากภาพในกล้อง
    async function predict() {
        if (!webcam || !model) return;

        const prediction = await model.predict(webcam.canvas);
        
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probabilityPercentage = (prediction[i].probability * 100).toFixed(0);

            const row = labelContainer.childNodes[i];
            row.querySelector(".class-name").innerText = className;
            row.querySelector(".class-prob").innerText = probabilityPercentage + "%";
            row.querySelector(".progress-bar-fill").style.width = probabilityPercentage + "%";
        }
    }
</script>

</body>
</html>
